
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Pantry Swipe</title>

  <!-- Link to external CSS -->
  <link rel="stylesheet" href="styles.css">

  <!--I used AI to take my initial project and help me fix the errors to build it into working code
  -->
</head>

<body>

<header>
  <h1>Pantry Swipe</h1>
  <p class="tagline">Generate recipe ideas from ingredients you already have.</p>
</header>

<main>

  <section>
    <h2>How Pantry Swipe Works</h2>
    <ol class="steps">
      <li>Enter the ingredients you have available</li>
      <li>Review one recipe idea at a time</li>
      <li>Select "Yes" to save or "No" to skip</li>
    </ol>
  </section>

  <section>
    <h2>Enter Your Ingredients</h2>
    <form>

      <label for="ingredients">Ingredients (separated by commas)</label>
      <textarea id="ingredients" name="ingredients" placeholder="e.g. chicken, rice, spinach"></textarea>

      <fieldset>
        <legend>Dietary Restrictions</legend>
        <label><input type="checkbox" name="restrictions" value="vegan"> Vegan</label>
        <label><input type="checkbox" name="restrictions" value="vegetarian"> Vegetarian</label>
        <label><input type="checkbox" name="restrictions" value="gluten-free"> Gluten-free</label>
        <label><input type="checkbox" name="restrictions" value="pescatarian"> Pescatarian</label>
        <label><input type="checkbox" name="restrictions" value="paleo"> Paleo</label>
        <label><input type="checkbox" name="restrictions" value="keto"> Keto</label>

        <label>
          <input type="checkbox" name="restrictions" value="other"> Other:
          <input type="text" name="other-restriction" placeholder="Specify">
        </label>
      </fieldset>

      <fieldset>
        <legend>Cooking Time</legend>
        <label><input type="radio" name="time" value="30"> 30 Minutes</label>
        <label><input type="radio" name="time" value="60"> 60 Minutes</label>
        <label><input type="radio" name="time" value="90"> 90 Minutes</label>
        <label><input type="radio" name="time" value="any"> Any</label>
      </fieldset>

      <button type="submit">Generate Recipe</button>

    </form>
  </section>

</main>

</body>
</html>
